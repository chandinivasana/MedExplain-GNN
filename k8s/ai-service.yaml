apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: medexplain-gnn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: dl-ai-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: medexplain-config
        livenessProbe:
          httpGet:
            path: /
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: medexplain-gnn
spec:
  selector:
    app: ai-service
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
